<!DOCTYPE html>
<html lang="ka" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Messenger | პროფილი</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .chat-bg { background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden font-sans">

    <div id="login-page" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
        <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-block p-4 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fas fa-id-card text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold">შექმენი პროფილი</h1>
                <p class="text-slate-400 text-sm mt-2">შეიყვანე შენი მონაცემები ჩატისთვის</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1 ml-1">სახელი</label>
                    <input type="text" id="user-name" placeholder="მაგ: გიორგი" 
                        class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none transition">
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1 ml-1">წელი</label>
                        <input type="number" id="user-year" placeholder="2010" 
                            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1 ml-1">თვე</label>
                        <select id="user-month" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none transition text-sm">
                            <option value="იანვარი">იანვარი</option>
                            <option value="თებერვალი">თებერვალი</option>
                            <option value="მარტი">მარტი</option>
                            <option value="აპრილი">აპრილი</option>
                            <option value="მაისი">მაისი</option>
                            <option value="ივნისი">ივნისი</option>
                            <option value="ივლისი">ივლისი</option>
                            <option value="აგვისტო">აგვისტო</option>
                            <option value="სექტემბერი">სექტემბერი</option>
                            <option value="ოქტომბერი">ოქტომბერი</option>
                            <option value="ნოემბერი">ნოემბერი</option>
                            <option value="დეკემბერი">დეკემბერი</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1 ml-1">დღე</label>
                        <input type="number" id="user-day" placeholder="15" 
                            class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] uppercase font-bold text-slate-500 mb-1 ml-1">პაროლი</label>
                    <input type="password" placeholder="••••••••" 
                        class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 focus:border-blue-500 outline-none transition">
                </div>

                <button onclick="startApp()" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition transform active:scale-95 mt-4">
                    შესვლა
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden h-screen flex flex-col md:flex-row">
        
        <aside class="w-full md:w-72 bg-slate-950 border-r border-slate-800 flex flex-col">
            <div class="p-8 text-center border-b border-slate-800">
                <div id="user-initial" class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center text-3xl font-bold shadow-xl shadow-blue-500/20">
                    ?
                </div>
                <h2 id="logged-user-name" class="text-xl font-bold truncate">სახელი</h2>
                <p class="text-xs text-green-500 mt-1 flex items-center justify-center gap-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Online
                </p>
            </div>

            <div class="flex-1 p-6 space-y-6">
                <div>
                    <h4 class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mb-4">ჩემი მონაცემები</h4>
                    <div class="space-y-3">
                        <div class="flex items-center gap-3 p-3 bg-slate-900/50 rounded-2xl border border-slate-800">
                            <i class="fas fa-calendar text-blue-500"></i>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase">წელი</p>
                                <p id="info-year" class="text-sm font-bold">-</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-slate-900/50 rounded-2xl border border-slate-800">
                            <i class="fas fa-calendar-check text-purple-500"></i>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase">თვე</p>
                                <p id="info-month" class="text-sm font-bold">-</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 p-3 bg-slate-900/50 rounded-2xl border border-slate-800">
                            <i class="fas fa-birthday-cake text-pink-500"></i>
                            <div>
                                <p class="text-[10px] text-slate-500 uppercase">დღე</p>
                                <p id="info-day" class="text-sm font-bold">-</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6">
                <button onclick="location.reload()" class="w-full p-3 rounded-xl border border-slate-800 hover:bg-red-500/10 hover:text-red-500 transition text-sm">
                    გასვლა
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col chat-bg">
            <header class="h-16 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md flex items-center px-6">
                <i class="fas fa-users text-slate-500 mr-3"></i>
                <h3 class="font-bold">საერთო ჩატი (6-12 კლასი)</h3>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
                </div>

            <div class="p-4 bg-slate-900/80 backdrop-blur-md border-t border-slate-800">
                <div class="max-w-4xl mx-auto flex gap-3">
                    <input type="text" id="msg-input" placeholder="დაწერე რამე..." 
                        class="flex-1 bg-slate-800 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition">
                    <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 w-14 h-14 rounded-2xl flex items-center justify-center transition shadow-lg shadow-blue-600/20">
                        <i class="fas fa-paper-plane text-xl"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // აპლიკაციის დაწყება (Login)
        function startApp() {
            const name = document.getElementById('user-name').value;
            const year = document.getElementById('user-year').value;
            const month = document.getElementById('user-month').value;
            const day = document.getElementById('user-day').value;

            if(!name || !year || !day) {
                alert("გთხოვთ შეავსოთ ყველა ველი!");
                return;
            }

            // მონაცემების ასახვა Sidebar-ში
            document.getElementById('logged-user-name').innerText = name;
            document.getElementById('user-initial').innerText = name[0].toUpperCase();
            document.getElementById('info-year').innerText = year;
            document.getElementById('info-month').innerText = month;
            document.getElementById('info-day').innerText = day;

            // ეკრანის გადართვა
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            // მისალმება ჩატში
            addSystemMessage(`მოგესალმებით, ${name}! თქვენ წარმატებით შეხვედით ჩატში.`);
        }

        // შეტყობინების გაგზავნა
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const chatBox = document.getElementById('chat-box');
            
            if(input.value.trim() === "") return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const msgDiv = document.createElement('div');
            msgDiv.className = "flex justify-end animate-in fade-in slide-in-from-right-4 duration-300";
            msgDiv.innerHTML = `
                <div class="max-w-[75%]">
                    <div class="bg-blue-600 p-3 px-4 rounded-2xl rounded-tr-none shadow-lg text-sm">
                        ${input.value}
                    </div>
                    <p class="text-[9px] text-right text-slate-500 mt-1 font-bold uppercase tracking-widest">შენ • ${time}</p>
                </div>
            `;
            
            chatBox.appendChild(msgDiv);
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // სისტემური შეტყობინება
        function addSystemMessage(text) {
            const chatBox = document.getElementById('chat-box');
            const sysDiv = document.createElement('div');
            sysDiv.className = "text-center";
            sysDiv.innerHTML = `<span class="bg-slate-800 text-slate-400 text-[10px] px-3 py-1 rounded-full uppercase font-bold tracking-tighter">${text}</span>`;
            chatBox.appendChild(sysDiv);
        }

        // Enter-ზე რეაგირება
        document.getElementById('msg-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    </script>

</body>
</html>
